name: Otus homework tests

on:
  push:
    branches:
      - hw*

env:
  GO111MODULE: "on"

jobs:
  lint:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, 'calendar') }}
    steps:
      - name: Extract branch name
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5  # ← Обновлено до v5
        with:
          go-version: '1.25'        # ← Фиксированная версия вместо ~1.25
          cache: true               # ← Включить кэширование модулей

      - name: Check out code
        uses: actions/checkout@v4   # ← Обновлено до v4

      - name: Linters
        uses: golangci/golangci-lint-action@v6  # ← Обновлено до v6
        with:
          version: v2.11.4          # ← Ключевое: версия линтера, совместимая с Go 1.25
          working-directory: ${{ env.BRANCH }}
          # args: --config=.golangci.yml  # ← Раскомментируйте, если конфиг не в корне

  tests:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, 'calendar') }}
    steps:
      - name: Extract branch name
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check out code
        uses: actions/checkout@v4

      - name: Unit tests
        run: go test -v -count=1 -race -timeout=1m ./...
        working-directory: ${{ env.BRANCH }}

      - name: Optimization tests
        run: go test -v -count=1 -timeout=1m -tags bench ./...
        if: env.BRANCH == 'hw10_program_optimization'
        working-directory: ${{ env.BRANCH }}

      - name: Bash tests
        shell: bash
        run: ./test.sh
        if: contains('hw01_hello_diasoft hw07_file_copying hw08_envdir_tool hw11_telnet_client', env.BRANCH)
        working-directory: ${{ env.BRANCH }}

  tests_by_makefile:
    runs-on: ubuntu-latest
    if: contains(github.ref, 'calendar')
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check out code
        uses: actions/checkout@v4

      - name: Make lint
        run: make lint
        working-directory: hw12_13_14_15_16_calendar

      - name: Make build
        run: make build
        working-directory: hw12_13_14_15_16_calendar

      - name: Make test
        run: make test
        working-directory: hw12_13_14_15_16_calendar